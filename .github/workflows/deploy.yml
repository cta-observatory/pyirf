name: Deploy to PyPi

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python --version
          pip install -U pip build setuptools_scm[toml]
          # make sure we have the version, grep will exit with 1 if it finds 0.0.0
          python -m setuptools_scm | grep -v '0.0.0'
          python -m build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
